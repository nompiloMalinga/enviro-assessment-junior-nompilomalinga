<mat-card>

    <mat-card-title>
        Withdrawal History
    </mat-card-title>

    <mat-card-content>

        <table mat-table [dataSource]="dataSource">

            <!-- Product -->
            <ng-container matColumnDef="productId">
                <th mat-header-cell *matHeaderCellDef>
                    Product ID
                </th>

                <td mat-cell *matCellDef="let withdrawal">
                    {{ withdrawal.productId }}
                </td>
            </ng-container>

            <!-- Amount -->
            <ng-container matColumnDef="amount">
                <th mat-header-cell *matHeaderCellDef>
                    Amount
                </th>

                <td mat-cell *matCellDef="let withdrawal">
                    {{ withdrawal.amount | currency:'ZAR' }}
                </td>
            </ng-container>

            <!-- Date -->
            <ng-container matColumnDef="withdrawalDate">
                <th mat-header-cell *matHeaderCellDef>
                    Date
                </th>

                <td mat-cell *matCellDef="let withdrawal">
                    {{ withdrawal.withdrawalDate | date:'mediumDate' }}
                </td>
            </ng-container>

            <!-- Status -->
            <ng-container matColumnDef="status">
                <th mat-header-cell *matHeaderCellDef>
                    Status
                </th>

                <td mat-cell *matCellDef="let withdrawal">
                    {{ withdrawal.status }}
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

        </table>
        <mat-paginator [pageSize]="5" [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons>
        </mat-paginator>

    </mat-card-content>

</mat-card>
